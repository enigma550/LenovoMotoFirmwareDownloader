<div
  class="rounded-lg border p-3"
  [class.border-dark-border]="isDark()"
  [class.bg-dark-elevated]="isDark()"
  [class.border-light-border]="!isDark()"
  [class.bg-light-bg]="!isDark()"
>
  <p
    class="text-sm font-semibold"
    [class.text-dark-text-bright]="isDark()"
    [class.text-light-text-bright]="!isDark()"
  >
    {{ title() }}
  </p>
  <p class="mt-1 text-xs" [class.text-dark-text-dim]="isDark()" [class.text-light-text-dim]="!isDark()">
    {{ description() }}
  </p>
  <div class="mt-3">
    <app-rescue-dialog-button
      [label]="buttonLabel()"
      [isDark]="isDark()"
      [disabled]="buttonDisabled()"
      variant="secondary"
      (clicked)="onInstall()"
    />
  </div>
  @if (installed() && installedNote()) {
    <p class="mt-2 text-xs text-success">
      ✓ {{ installedNote() }}
    </p>
  }
</div>

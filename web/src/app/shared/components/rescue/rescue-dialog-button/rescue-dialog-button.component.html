<button
  class="rounded-lg border px-3 py-1.5 text-xs font-medium transition-colors duration-200 disabled:cursor-not-allowed disabled:opacity-50"
  [class.border-dark-border]="variant() === 'secondary' && isDark()"
  [class.text-dark-text]="variant() === 'secondary' && isDark()"
  [class.hover:bg-dark-elevated]="variant() === 'secondary' && isDark()"
  [class.border-light-border]="variant() === 'secondary' && !isDark()"
  [class.text-light-text]="variant() === 'secondary' && !isDark()"
  [class.hover:bg-light-bg]="variant() === 'secondary' && !isDark()"
  [class.border-accent]="variant() === 'primary'"
  [class.bg-accent]="variant() === 'primary'"
  [class.text-white]="variant() === 'primary'"
  [class.hover:bg-accent-hover]="variant() === 'primary'"
  [attr.type]="buttonType()"
  [disabled]="disabled()"
  (click)="onClick()"
>
  {{ label() }}
</button>

<section
  class="rounded-xl border p-5 transition-all duration-200"
  [class.border-dark-border]="store.isDark()"
  [class.bg-dark-surface]="store.isDark()"
  [class.border-light-border]="!store.isDark()"
  [class.bg-light-surface]="!store.isDark()"
  [class.shadow-sm]="!store.isDark()"
>
  <h3
    class="text-base font-semibold"
    [class.text-dark-text-bright]="store.isDark()"
    [class.text-light-text-bright]="!store.isDark()"
  >
    Connected Lookup
  </h3>
  <p
    class="mt-1 text-sm"
    [class.text-dark-text-dim]="store.isDark()"
    [class.text-light-text-dim]="!store.isDark()"
  >
    Run firmware lookup from connected device
  </p>

  <button
    class="mt-4 w-full rounded-lg bg-accent px-4 py-2.5 text-sm font-semibold text-white transition-colors hover:bg-accent-hover"
    type="button"
    (click)="store.runConnectedLookup()"
  >
    ⚡ Run Lookup
  </button>

  @if (store.connectedSummary()) {
    <div
      class="mt-4 rounded-lg border p-3 text-sm"
      [class.border-dark-border]="store.isDark()"
      [class.bg-dark-elevated]="store.isDark()"
      [class.text-dark-text]="store.isDark()"
      [class.border-light-border]="!store.isDark()"
      [class.bg-light-bg]="!store.isDark()"
      [class.text-light-text]="!store.isDark()"
    >
      <span class="text-accent">→</span>
      {{ store.connectedSummary() }}
    </div>
  }
</section>
